<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#080b10" />
    <meta name="description" content="Soundbound — modular music streaming with plugin sources" />

    <!-- PWA / mobile chrome -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Soundbound" />

    <title>Soundbound</title>

    <!-- Prevent flash of unstyled background -->
    <style>
      html, body, #root {
        margin: 0;
        padding: 0;
        background: #080b10;
        min-height: 100dvh;
        /* Prevent iOS bounce scroll showing white edges */
        overscroll-behavior: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- Vite replaces this with the bundled module graph -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
